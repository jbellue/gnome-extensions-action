name: "Package and Upload GNOME Extension"
description: "Build and upload GNOME Shell extensions to extensions.gnome.org"
author: "murar8"

branding:
  icon: "package"
  color: "blue"

inputs:
  source-dir:
    description: "Extension source directory (absolute or relative path)"
    required: false
    default: "."
  username:
    description: "Username for extensions.gnome.org (skip upload if not provided)"
    required: false
  password:
    description: "Password for extensions.gnome.org (skip upload if not provided)"
    required: false
  extra-source:
    description: "Additional source files to include (comma-separated)"
    required: false
  schema:
    description: "GSettings schema that should be included"
    required: false
  podir:
    description: "Directory where translations are found"
    required: false
  gettext-domain:
    description: "Gettext domain to use for translations"
    required: false
  output-dir:
    description: "Directory where the package should be created"
    required: false
    default: "."
  force:
    description: "Overwrite an existing pack"
    required: false
    default: "false"
  image:
    description: "Docker image to use for gnome-extensions tool"
    required: false
    default: "ghcr.io/murar8/gnome-extensions-action:latest"

outputs:
  package-path:
    description: "Path to the packaged extension .zip file"
    value: ${{ steps.pack.outputs.package-path }}

runs:
  using: "docker"
  image: "Dockerfile"
  args:
    - "help"
