name: Publish Docker Images

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build wiremock image
        uses: docker/build-push-action@v6
        with:
          context: wiremock
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test container
        run: ./test.sh

      - name: Docker logs
        if: always()
        run: docker compose -f docker-compose.test.yml logs

  publish:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    permissions:
      packages: write
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: app
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test extension
        uses: ./
        with:
          source-dir: ./test-extension
          output-dir: ./build-extra
          extra-source: |
            ./extra-1.js
            ./extra-2.js

      - name: Verify extension
        run: |
          test -f ./build-extra/test-extension@example.com.shell-extension.zip
          tmpdir=$(mktemp -d)
          mkdir -p $tmpdir/extracted
          unzip -q ./build-extra/test-extension@example.com.shell-extension.zip -d $tmpdir/extracted
          diff -r ./test-extension $tmpdir/extracted
          echo "Extension with extra sources test passed!"
          rm -rf $tmpdir
