name: Publish Docker Images

on:
  push:
    branches:
      - main

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build wiremock image
        uses: docker/build-push-action@v6
        with:
          context: wiremock
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload extension
        run: |
          docker compose -f docker-compose.test.yml run --rm upload

      - name: Verify output
        run: |
          test -f ./dist/test-extension@example.com.shell-extension.zip
          mkdir -p ./extracted
          unzip -q ./dist/test-extension@example.com.shell-extension.zip -d ./extracted
          diff -r ./test-extension ./extracted

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/murar8/gnome-extensions-tool
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: app
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
