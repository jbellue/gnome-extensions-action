name: Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test package
        id: pack
        uses: ./
        with:
          source-dir: ./test-extension
          output-dir: ./dist

      - name: Verify output
        run: |
          [ "${{ steps.pack.outputs.zip-file }}" == "./dist/test-extension@example.com.shell-extension.zip" ] || exit 1
          test -f ./dist/test-extension@example.com.shell-extension.zip
          mkdir -p ./extracted
          unzip -q ./dist/test-extension@example.com.shell-extension.zip -d ./extracted
          diff -r ./test-extension ./extracted

  test-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build and start WireMock server
        run: |
          docker build -t wiremock-test ./wiremock
          docker run -d --name wiremock \
            --network host \
            wiremock-test
          # Wait for WireMock to be ready
          sleep 5

      - name: Configure host to use mock server
        run: |
          # Redirect extensions.gnome.org to localhost where WireMock is running
          echo "127.0.0.1 extensions.gnome.org" | sudo tee -a /etc/hosts

          # Trust the self-signed certificate system-wide
          sudo cp cert.pem /usr/local/share/ca-certificates/wiremock.crt
          sudo update-ca-certificates

      - name: Test upload with mock server
        uses: ./
        with:
          source-dir: ./test-extension
          output-dir: ./dist
          username: test-user
          password: test-password
          accept-tos: true

      - name: Check WireMock logs
        if: always()
        run: docker logs wiremock

      - name: Stop WireMock
        if: always()
        run: docker stop wiremock && docker rm wiremock
