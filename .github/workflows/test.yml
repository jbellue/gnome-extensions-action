name: Test

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Test package
        id: pack
        uses: ./
        with:
          source-dir: ./test-extension
          output-dir: ./dist

      - name: Verify output
        run: |
          [ "${{ steps.pack.outputs.zip-file }}" == "./dist/test-extension@example.com.shell-extension.zip" ] || exit 1
          test -f ./dist/test-extension@example.com.shell-extension.zip
          mkdir -p ./extracted
          unzip -q ./dist/test-extension@example.com.shell-extension.zip -d ./extracted
          diff -r ./test-extension ./extracted

  test-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build and start WireMock server
        id: wiremock
        run: |
          docker build -t wiremock-test ./wiremock
          docker run -d --name wiremock wiremock-test
          sleep 5 # Wait for WireMock to be ready
          echo "::set-output name=ip::$(docker inspect --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' wiremock)"

      - name: Test upload with mock server
        uses: ./
        env:
          HTTPS_PROXY: http://${{ steps.wiremock.outputs.ip }}:443
        with:
          source-dir: ./test-extension
          output-dir: ./dist
          username: test-user
          password: test-password
          accept-tos: true

      - name: Check WireMock logs
        if: always()
        run: docker logs wiremock

      - name: Stop WireMock
        if: always()
        run: docker stop wiremock && docker rm wiremock
